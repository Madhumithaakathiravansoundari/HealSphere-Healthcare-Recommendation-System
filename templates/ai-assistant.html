<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HealSphere AI Assistant</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f7fb;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 18px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .15);
        }

        .chat-container {
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, .1);
        }

        #chat-box {
            height: 520px;
            overflow-y: auto;
            padding: 20px;
            background: #eef3fb;
        }

        .user {
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 18px 18px 5px 18px;
            width: fit-content;
            max-width: 75%;
            margin-left: auto;
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        .bot {
            background: white;
            color: #222;
            padding: 12px 18px;
            border-radius: 18px 18px 18px 5px;
            width: fit-content;
            max-width: 75%;
            margin-bottom: 15px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .08);
            word-wrap: break-word;
        }

        .typing {
            color: #666;
            font-style: italic;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #ddd;
        }

        #message {
            flex: 1;
            padding: 18px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        #sendBtn {
            width: 140px;
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        #sendBtn:hover {
            background: #1d4ed8;
        }

        .bot h1,
        .bot h2,
        .bot h3 {
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .bot ul {
            padding-left: 20px;
        }

        .bot p {
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

    <div class="header flex justify-between items-center px-6">
    
        <span>🤖 HealSphere AI Assistant</span>
    
        <button onclick="clearChat()" class="bg-white text-blue-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-100">
            Clear Chat
        </button>
    
    </div>

    <div class="chat-container">

        <div id="chat-box">

            <div class="bot">
                👋 Hello! I am <b>HealSphere AI</b>.<br><br>
                Ask me about diseases, medicines, symptoms, treatments,
                diet, yoga, prevention or anything related to healthcare.
            </div>
                </div>
                
                <div class="input-area">
                
                    <input id="message" type="text" placeholder="Ask me anything about healthcare..." autocomplete="off">
                
                    <button id="sendBtn" onclick="sendMessage()">
                        Send
                    </button>
                
                </div>
                
                </div>
                
                <script>

                    const chatBox = document.getElementById("chat-box");
                    const input = document.getElementById("message");

                    input.addEventListener("keypress", function (event) {

                        if (event.key === "Enter") {
                            sendMessage();
                        }

                    });

                    function addUserMessage(text) {

                        chatBox.innerHTML += `
                        <div class="user">
                            ${text}
                        </div>
                    `;

                        chatBox.scrollTop = chatBox.scrollHeight;

                    }

                    function addBotMessage(text) {

                        chatBox.innerHTML += `
                        <div class="bot">
                            ${marked.parse(text)}
                        </div>
                    `;

                        chatBox.scrollTop = chatBox.scrollHeight;

                    }

                    function showTyping() {

                        chatBox.innerHTML += `
                        <div class="bot typing" id="typing">
                            ⏳ Thinking...
                        </div>
                    `;

                        chatBox.scrollTop = chatBox.scrollHeight;

                    }

                    function removeTyping() {

                        const typing = document.getElementById("typing");

                        if (typing) {
                            typing.remove();
                        }

                    }
                    async function sendMessage() {

                            const message = input.value.trim();

                            if (message === "") {
                                return;
                            }

                            addUserMessage(message);

                            input.value = "";

                            showTyping();

                            try {

                                const response = await fetch("/chat", {

                                    method: "POST",

                                    headers: {
                                        "Content-Type": "application/json"
                                    },

                                    body: JSON.stringify({
                                        message: message
                                    })

                                });

                                const data = await response.json();

                                removeTyping();

                                addBotMessage(data.reply);

                            }
                            catch (error) {

                                removeTyping();

                                addBotMessage(
                                    "❌ Unable to connect to the AI server. Please try again."
                                );

                                console.log(error);

                            }

                        }
                        function clearChat() {

                                chatBox.innerHTML = `
        <div class="bot">
            👋 Hello! I am <b>HealSphere AI</b>.<br><br>
            Ask me about diseases, medicines, symptoms, treatments,
            diet, yoga, prevention or anything related to healthcare.
        </div>
    `;

                                input.focus();

                            }

                            // Auto focus when page loads
                            window.onload = function () {
                                input.focus();
                            };
                            </script>
                            
                            </body>
                            
                            </html>
